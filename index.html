<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<!-- PWA Manifest (inline - no extra files needed) -->
<link rel="manifest" id="pwa-manifest">
<script>
// =============================================
// PWA SETUP - Inline Manifest + Service Worker
// =============================================
(function() {
  // 1. Inject manifest as data URI
  const manifest = {
    name: "💰 نظام الحسابات المالية",
    short_name: "حساباتي",
    description: "نظام إدارة الحسابات المالية",
    start_url: "./",
    display: "standalone",
    background_color: "#667eea",
    theme_color: "#667eea",
    orientation: "portrait-primary",
    lang: "ar",
    dir: "rtl",
    icons: [
      {
        src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%23667eea'/%3E%3Ctext x='96' y='130' font-size='110' text-anchor='middle'%3E%F0%9F%92%B0%3C/text%3E%3C/svg%3E",
        sizes: "192x192",
        type: "image/svg+xml",
        purpose: "any maskable"
      },
      {
        src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='80' fill='%23667eea'/%3E%3Ctext x='256' y='360' font-size='300' text-anchor='middle'%3E%F0%9F%92%B0%3C/text%3E%3C/svg%3E",
        sizes: "512x512",
        type: "image/svg+xml",
        purpose: "any maskable"
      }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  document.getElementById('pwa-manifest').href = URL.createObjectURL(blob);

  // 2. Register inline Service Worker for offline caching
  if ('serviceWorker' in navigator) {
    const swCode = `
const CACHE = 'fin-v3';
const OFFLINE_URLS = [
  self.location.href.replace('/sw.js','/'),
  self.location.href.replace('/sw.js',''),
  'https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js',
  'https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js',
  'https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js',
  'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js'
];
self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(c => c.addAll(OFFLINE_URLS).catch(()=>{}))
  );
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  // Network first for Firebase, cache first for static assets
  const url = e.request.url;
  if (url.includes('firebasedatabase.app') || url.includes('firebase')) {
    e.respondWith(
      fetch(e.request).catch(() => {
        // Offline: return empty response so app uses localStorage cache
        return new Response(JSON.stringify(null), {headers:{'Content-Type':'application/json'}});
      })
    );
    return;
  }
  e.respondWith(
    caches.match(e.request).then(cached => {
      const fetchPromise = fetch(e.request).then(resp => {
        if (resp && resp.status === 200 && e.request.method === 'GET') {
          const clone = resp.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
        }
        return resp;
      }).catch(() => cached);
      return cached || fetchPromise;
    })
  );
});
`;
    const swBlob = new Blob([swCode], {type:'application/javascript'});
    const swUrl = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl, {scope: './'})
      .then(reg => console.log('✅ SW registered:', reg.scope))
      .catch(err => console.log('SW note:', err.message));
  }

  // 3. Show install prompt on Android Chrome
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    showInstallBanner();
  });

  function showInstallBanner() {
    if (document.getElementById('installBanner')) return;
    const banner = document.createElement('div');
    banner.id = 'installBanner';
    banner.style.cssText = `
      position:fixed;bottom:0;left:0;right:0;
      background:linear-gradient(135deg,#c4a55a,#8b6914);
      color:white;padding:14px 20px;
      display:flex;justify-content:space-between;align-items:center;
      z-index:99999;box-shadow:0 -4px 20px rgba(0,0,0,0.3);
      font-family:'Segoe UI',sans-serif;gap:12px;flex-wrap:wrap;
    `;
    banner.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:26px">💰</span>
        <div>
          <div style="font-weight:bold;font-size:15px">ثبّت التطبيق على جهازك</div>
          <div style="font-size:12px;opacity:0.85">يشتغل بدون إنترنت بعد التثبيت</div>
        </div>
      </div>
      <div style="display:flex;gap:8px">
        <button id="installBtn" style="background:white;color:#667eea;border:none;border-radius:10px;padding:10px 18px;font-weight:bold;cursor:pointer;font-size:14px">📲 تثبيت</button>
        <button id="dismissBtn" style="background:rgba(255,255,255,0.2);color:white;border:none;border-radius:10px;padding:10px 14px;cursor:pointer;font-size:14px">✕</button>
      </div>
    `;
    document.body.appendChild(banner);
    document.getElementById('installBtn').onclick = async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const {outcome} = await deferredPrompt.userChoice;
        if (outcome === 'accepted') banner.remove();
        deferredPrompt = null;
      }
    };
    document.getElementById('dismissBtn').onclick = () => {
      banner.remove();
      sessionStorage.setItem('installDismissed','1');
    };
  }

  // 4. iOS Safari - show manual instructions
  window.addEventListener('load', () => {
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isInStandalone = window.navigator.standalone;
    const dismissed = sessionStorage.getItem('iosDismissed');
    if (isIOS && !isInStandalone && !dismissed) {
      setTimeout(() => {
        if (document.getElementById('iosBanner')) return;
        const b = document.createElement('div');
        b.id = 'iosBanner';
        b.style.cssText = `
          position:fixed;bottom:0;left:0;right:0;
          background:linear-gradient(135deg,#c4a55a,#8b6914);
          color:white;padding:16px 20px;
          z-index:99999;box-shadow:0 -4px 20px rgba(0,0,0,0.3);
          font-family:'Segoe UI',sans-serif;text-align:center;
        `;
        b.innerHTML = `
          <div style="font-weight:bold;font-size:16px;margin-bottom:6px">📲 ثبّت التطبيق على iPhone</div>
          <div style="font-size:13px;opacity:0.9;margin-bottom:12px">
            اضغط زر المشاركة <strong>□↑</strong> ثم اختر<br>
            <strong>"إضافة إلى الشاشة الرئيسية"</strong>
          </div>
          <button onclick="this.parentElement.remove();sessionStorage.setItem('iosDismissed','1')"
            style="background:rgba(255,255,255,0.25);color:white;border:none;border-radius:10px;padding:8px 20px;cursor:pointer;font-size:14px">
            فهمت ✓
          </button>
        `;
        document.body.appendChild(b);
      }, 2500);
    }
  });
})();
</script>


<!-- Offline PWA Meta -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="حساباتي">
<meta name="theme-color" content="#667eea">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💰 نظام إدارة الحسابات المالية</title>
<style>
/* ══════════════════════════════════════════════════════
   VARIABLES & RESET
══════════════════════════════════════════════════════ */
:root {
  --primary: #c4a55a; --primary2: #0d1b3e;
  --green:   #10b981; --red:    #ef4444;
  --amber:   #f59e0b; --blue:   #3b82f6;
  --purple:  #8b5cf6; --pink:   #ec4899;

  --bg:     #f1f5f9;
  --card:   #ffffff;
  --border: #e2e8f0;
  --text:   #1e293b;
  --text2:  #64748b;
  --text3:  #94a3b8;

  --r-sm: 8px; --r: 14px; --r-lg: 20px;
  --shadow: 0 2px 12px rgba(0,0,0,.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.14);
  --font: 'Segoe UI', Tahoma, sans-serif;
}
body.dark {
  --bg: #0f172a; --card: #1e2a3a;
  --border: #2d3748; --text: #e2e8f0;
  --text2: #94a3b8; --text3: #64748b;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box }
html { scroll-behavior:smooth; -webkit-text-size-adjust:100% }

body {
  font-family: var(--font);
  background: linear-gradient(170deg,#0a1228 0%,#0d1b3e 50%,#0e1f40 100%);
  min-height:100dvh;
  padding: clamp(10px,3vw,24px);
  color: var(--text);
  transition: background .3s;
}
body.dark { background:linear-gradient(170deg,#06090f 0%,#0a1228 100%) }
.hidden   { display:none !important }
.container{ max-width:1100px; margin:0 auto }
button    { min-height:36px; cursor:pointer; font-family:var(--font) }
select    { background:var(--card); color:var(--text) }

/* ══════════════════════════════════════════════════════
   LOGIN SCREEN
══════════════════════════════════════════════════════ */
.login-screen {
  background:var(--card); border-radius:var(--r-lg);
  padding: clamp(22px,6vw,50px) clamp(18px,5vw,40px);
  max-width:460px; margin:clamp(16px,8vh,80px) auto;
  box-shadow:var(--shadow-lg); text-align:center;
}
.login-screen h1 { color:var(--text); font-size:clamp(18px,5vw,26px); margin-bottom:22px }

.user-select-btn {
  width:100%; padding:clamp(11px,3vw,16px);
  margin:6px 0; font-size:clamp(14px,4vw,17px);
  font-weight:bold; border:none; border-radius:var(--r);
  color:white; transition:transform .15s,opacity .15s;
}
.user-select-btn:hover  { transform:scale(1.02); opacity:.92 }
.user-select-btn:active { transform:scale(.98) }

.password-input {
  width:100%; padding:13px 15px;
  font-size:16px; border:2px solid var(--border);
  border-radius:var(--r); margin-bottom:10px;
  text-align:center; background:var(--card); color:var(--text);
  transition:border-color .2s;
}
.password-input:focus { outline:none; border-color:var(--primary) }

.login-btn {
  width:100%; padding:14px; font-size:16px;
  background:var(--blue); color:white;
  border:none; border-radius:var(--r); font-weight:bold;
  transition:background .2s;
}
.login-btn:hover { background:#2563eb }

.back-btn {
  width:100%; padding:11px; font-size:14px;
  background:var(--border); color:var(--text2);
  border:none; border-radius:var(--r); margin-top:8px;
}
.error-msg { color:var(--red); font-size:14px; margin-top:10px; display:none }

.pw-wrap { position:relative }
.pw-wrap input { padding-left:44px !important }
.pw-eye { position:absolute; left:12px; top:50%; transform:translateY(-50%); background:none; border:none; font-size:18px; color:var(--text2); min-height:unset }

/* ══════════════════════════════════════════════════════
   OFFLINE BAR
══════════════════════════════════════════════════════ */
#offlineBar {
  display:none; position:fixed; top:0; left:0; right:0;
  color:white; text-align:center; padding:9px;
  font-size:13px; font-weight:bold;
  z-index:99998; transition:background .3s;
}

/* ══════════════════════════════════════════════════════
   HEADER
══════════════════════════════════════════════════════ */
.header {
  background:var(--card); border-radius:var(--r);
  padding: clamp(11px,2.5vw,18px) clamp(13px,3.5vw,24px);
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:14px; box-shadow:var(--shadow);
  flex-wrap:wrap; gap:8px;
}
.header h1 { color:var(--text); font-size:clamp(15px,4vw,21px); white-space:nowrap }
.user-info  { display:flex; gap:8px; align-items:center; flex-wrap:wrap }

.btn {
  padding: clamp(7px,2vw,10px) clamp(10px,2.5vw,17px);
  border:none; border-radius:var(--r-sm);
  font-size:clamp(11px,2.5vw,13px); font-weight:bold;
  transition:transform .1s,opacity .15s; white-space:nowrap;
}
.btn:hover  { transform:scale(1.03); opacity:.9 }
.btn:active { transform:scale(.97) }
.export-btn   { background:var(--blue);  color:white }
.settings-btn { background:var(--amber); color:white }
.logout-btn   { background:var(--red);   color:white }

.user-badge { padding:5px 13px; border-radius:20px; font-size:12px; font-weight:bold; color:white; white-space:nowrap }
.dark-toggle { background:none; border:none; font-size:20px; padding:4px 8px; border-radius:var(--r-sm); transition:transform .2s; min-height:unset }
.dark-toggle:hover { transform:scale(1.2) }

/* ══════════════════════════════════════════════════════
   SHARED CARD BASE
══════════════════════════════════════════════════════ */
.dollar-rate-card,.form-card,.history-card,
.admin-section,.charts-section,.converter-card {
  background:var(--card); border-radius:var(--r);
  padding: clamp(14px,3.5vw,26px);
  margin-bottom:14px; box-shadow:var(--shadow);
}
.dollar-rate-card h2,.form-card h2,
.history-card h2,.admin-section h2 {
  color:var(--text); margin-bottom:14px;
  font-size:clamp(14px,3.5vw,17px);
}

/* ══════════════════════════════════════════════════════
   SHEKEL RATE CARD
══════════════════════════════════════════════════════ */
.rates-container  { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; align-items:center }
.rate-item        { background:#f0fdf4; border:2px solid var(--green); border-radius:var(--r); padding:11px 18px; text-align:center; min-width:130px }
.rate-item.sell   { background:#fef2f2; border-color:var(--red) }
.rate-label       { font-size:12px; color:var(--text2); margin-bottom:4px }
.rate-value       { font-size:clamp(20px,4vw,26px); font-weight:bold; color:var(--green) }
.rate-item.sell .rate-value { color:var(--red) }
.rate-edit-group  { display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:center; margin-top:10px }
.rate-edit-input  { width:88px; padding:8px 10px; font-size:15px; border:2px solid var(--border); border-radius:var(--r-sm); text-align:center; background:var(--card); color:var(--text) }
.rate-save-btn    { padding:8px 14px; background:var(--green); color:white; border:none; border-radius:var(--r-sm); font-size:14px; font-weight:bold }
.rate-save-btn:hover { opacity:.85 }

/* ══════════════════════════════════════════════════════
   STATS GRIDS
══════════════════════════════════════════════════════ */
.stats-grid   { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:14px }
.stats-grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:14px }

.stat-card {
  background:var(--card); border-radius:var(--r);
  padding: clamp(13px,3vw,22px);
  text-align:center; box-shadow:var(--shadow); position:relative;
}
.stat-icon  { font-size:clamp(22px,5vw,30px); margin-bottom:5px }
.stat-label { font-size:clamp(10px,2.5vw,12px); color:var(--text2); margin-bottom:5px }
.stat-value { font-size:clamp(18px,4.5vw,26px); font-weight:bold; color:var(--text) }
.stat-value.blue   { color:var(--blue) }
.stat-value.green  { color:var(--green) }
.stat-value.red    { color:var(--red) }
.stat-value.amber  { color:var(--amber) }
.stat-value.purple { color:var(--purple) }

.inline-edit-row { display:flex; align-items:center; justify-content:center; gap:8px; flex-wrap:wrap }
.edit-mini-btn   { background:var(--border); border:none; border-radius:var(--r-sm); padding:4px 9px; font-size:12px; color:var(--text2) }
.edit-mini-btn:hover { background:#cbd5e0 }
.top-right-btn   { position:absolute; top:7px; left:7px; background:var(--border); border:none; border-radius:var(--r-sm); padding:4px 8px; font-size:11px; color:var(--text2) }
.top-right-btn:hover { background:#cbd5e0 }
.copy-bal-btn    { background:none; border:none; font-size:12px; padding:2px 6px; border-radius:6px; color:var(--text3); transition:all .15s; min-height:unset }
.copy-bal-btn:hover { background:var(--border); color:var(--primary) }

/* ══════════════════════════════════════════════════════
   TRANSACTION FORM
══════════════════════════════════════════════════════ */
.add-btn {
  width:100%; padding:clamp(13px,3vw,18px);
  font-size:clamp(14px,3.5vw,17px);
  background:linear-gradient(135deg,#c4a55a,#8b6914);
  color:white; border:none; border-radius:var(--r);
  margin-bottom:14px; font-weight:bold; transition:transform .1s;
}
.add-btn:hover { transform:scale(1.01) }

.form-group       { margin-bottom:14px }
.form-group label { display:block; font-size:13px; color:var(--text2); margin-bottom:5px; font-weight:bold }

.form-group input[type=number],
.form-group input[type=text],
.form-group input[type=password],
.form-group select,
.form-group textarea {
  width:100%; padding:11px 13px;
  font-size:15px; border:2px solid var(--border);
  border-radius:var(--r-sm); background:var(--card); color:var(--text);
  transition:border-color .2s;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus { outline:none; border-color:var(--primary) }
.form-group textarea { height:80px; resize:vertical }

.type-buttons  { display:flex; gap:8px }
.type-btn {
  flex:1; padding:clamp(10px,2.5vw,13px);
  font-size:clamp(13px,3vw,15px);
  border:2px solid var(--border); border-radius:var(--r-sm);
  background:var(--card); font-weight:bold; color:var(--text);
  transition:all .15s;
}
.type-btn.add-active      { background:#dcfce7; border-color:var(--green);  color:var(--green) }
.type-btn.subtract-active { background:#fee2e2; border-color:var(--red);    color:var(--red) }
.type-btn.shekel-active   { background:#fef9c3; border-color:var(--amber);  color:#92400e }

.button-group { display:flex; gap:10px }
.submit-btn {
  flex:1; padding:13px; font-size:15px;
  border:none; border-radius:var(--r-sm); font-weight:bold; color:white;
  transition:opacity .15s;
}
.submit-btn:hover      { opacity:.88 }
.submit-btn.add        { background:var(--green) }
.submit-btn.subtract   { background:var(--red) }
.submit-btn.shekel     { background:var(--amber) }
.cancel-btn {
  padding:13px 16px; font-size:15px;
  background:var(--border); color:var(--text2);
  border:none; border-radius:var(--r-sm); font-weight:bold;
}
.cancel-btn:hover { background:#cbd5e0 }
.image-preview { max-width:100%; max-height:180px; border-radius:var(--r-sm); display:block; margin-top:10px }

/* ══════════════════════════════════════════════════════
   TRANSACTIONS LIST
══════════════════════════════════════════════════════ */
.transaction-item {
  padding: clamp(9px,2.5vw,13px);
  border-radius:var(--r-sm); margin-bottom:9px;
  display:flex; align-items:flex-start; gap:9px;
  border:1px solid var(--border);
}
.transaction-item.add      { background:#f0fdf4; border-color:#bbf7d0 }
.transaction-item.subtract { background:#fef2f2; border-color:#fecaca }
.transaction-item.shekel   { background:#fefce8; border-color:#fde68a }

.transaction-info   { flex:1; min-width:0 }
.transaction-amount { font-size:clamp(14px,3.5vw,17px); font-weight:bold; margin-bottom:3px }
.transaction-amount.add      { color:var(--green) }
.transaction-amount.subtract { color:var(--red) }
.transaction-amount.shekel   { color:#b45309 }
.transaction-details { font-size:11px; color:var(--text2); line-height:1.6 }
.transaction-notes   { font-size:12px; color:#92400e; margin-top:3px }
.transaction-icon    { font-size:19px; flex-shrink:0 }
.transaction-image   { width:50px; height:50px; object-fit:cover; border-radius:var(--r-sm); cursor:pointer; flex-shrink:0 }

.edit-tx-btn { background:none; border:none; font-size:14px; padding:3px 6px; border-radius:6px; color:var(--text2); transition:background .15s; min-height:unset }
.edit-tx-btn:hover { background:var(--border) }
.del-tx-btn  { background:none; border:none; font-size:14px; padding
